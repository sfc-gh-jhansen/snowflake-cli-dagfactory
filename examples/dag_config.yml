default:
  warehouse: "DEMO_WH"
  task_auto_retry_attempts: 2
  suspend_task_after_num_failures: 3

my_etl_pipeline:
  schedule: "USING CRON 0 6 * * * America/Los_Angeles"
  description: "Daily ETL pipeline"
  user_task_timeout_ms: 3600000
  allow_overlapping_execution: false

  config:
    environment: "production"
    path: "/prod/"

  tasks:
    - task_id: extract_data
      sql: "INSERT INTO staging SELECT * FROM raw_table"
      warehouse: "EXTRACT_WH"
      user_task_timeout_ms: 600000
      description: "Extract raw data into staging"

    - task_id: transform_data
      sql: "INSERT INTO transformed SELECT * FROM staging"
      dependencies: [extract_data]
      description: "Transform staged data"

    - task_id: load_dim_customers
      sql: "CALL load_dim_customers()"
      dependencies: [transform_data]

    - task_id: load_dim_products
      stored_procedure: "my_db.my_schema.load_dim_products"
      dependencies: [transform_data]
      task_auto_retry_attempts: 3

    - task_id: aggregate_sales
      sql: "INSERT INTO sales_agg SELECT * FROM staging_sales"
      dependencies: [load_dim_customers, load_dim_products]

    - task_id: run_forecast
      notebook_project: "my_db.my_schema.forecast_project"
      main_file: "forecast.ipynb"
      compute_pool: "ML_POOL"
      query_warehouse: "ML_WH"
      runtime: "2.2-CPU-PY3.11"
      arguments: "env prod"
      dependencies: [aggregate_sales]
      description: "Run sales forecast notebook"

    - task_id: cleanup
      sql: "DROP TABLE IF EXISTS temp_staging"
      finalizer: true
